info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{URL}}/auth/register"
  body:
    type: json
    data: |-
      {
        "name": "Ali",
        "email": "khalid@gmail.com",
        "phoneNumber": "01598989123",
        "password": "pass123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("jwt", res.body.accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
