info:
  name: create-country
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/countries
  headers:
    - name: Authorization
      value: Bearer {{jwt}}
  body:
    type: json
    data: |-
      {
        "name": "Jordan",
        "countryCode": "JA"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
