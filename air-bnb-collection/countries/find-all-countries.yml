info:
  name: find-all-countries
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/countries
  headers:
    - name: Authorization
      value: Bearer {{jwt}}
  params:
    - name: name
      value: Ir
      type: query
      disabled: true
    - name: countryCode
      value: Egppt
      type: query
      disabled: true
    - name: limit
      value: "1"
      type: query
      disabled: true
    - name: page
      value: "2"
      type: query
      disabled: true
    - name: ignoreLimit
      value: "true"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
